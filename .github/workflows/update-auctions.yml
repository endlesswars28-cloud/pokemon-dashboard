name: Update Auction Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-auctions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auction scraper
        run: node scraper-auctions.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No auction changes detected"
          else
            TIMESTAMP=$(TZ='Asia/Bangkok' date '+%d/%m/%Y %H:%M')
            git commit -m "Auto-update auctions: ${TIMESTAMP}"
            git push
          fi
