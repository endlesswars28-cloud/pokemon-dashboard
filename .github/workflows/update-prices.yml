name: Update Pokemon TCG Prices

on:
  schedule:
      - cron: '0 19 * * *'
        workflow_dispatch:

        jobs:
          scrape-prices:
              runs-on: ubuntu-latest
                  permissions:
                        contents: write

                            steps:
                                  - name: Checkout repository
                                          uses: actions/checkout@v4

                                                - name: Setup Node.js
                                                        uses: actions/setup-node@v4
                                                                with:
                                                                          node-version: '20'

                                                                                - name: Run price scraper
                                                                                        run: node scraper.js

                                                                                              - name: Commit updated prices.json
                                                                                                      run: |
                                                                                                                git config user.name  "github-actions[bot]"
                                                                                                                          git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                    git add prices.json
                                                                                                                                              git diff --staged --quiet || git commit -m "Update card prices $(date +'%Y-%m-%d')"
                                                                                                                                                        git push
